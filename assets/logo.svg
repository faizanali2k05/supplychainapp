<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f8fafc" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Chain links representing blockchain -->
  <g stroke="#2563eb" stroke-width="3" fill="none">
    <!-- Link 1 -->
    <rect x="40" y="85" width="25" height="30" rx="4"/>
    <!-- Link 2 -->
    <rect x="87.5" y="85" width="25" height="30" rx="4"/>
    <!-- Link 3 -->
    <rect x="135" y="85" width="25" height="30" rx="4"/>
    
    <!-- Connecting lines -->
    <line x1="65" y1="100" x2="87.5" y2="100" stroke="#059669" stroke-width="2"/>
    <line x1="112.5" y1="100" x2="135" y2="100" stroke="#059669" stroke-width="2"/>
  </g>
  
  <!-- Package/product icon in center -->
  <g fill="#2563eb">
    <!-- Box top -->
    <path d="M 75 55 L 100 45 L 125 55 L 100 65 Z" fill="#059669"/>
    <!-- Box side -->
    <path d="M 125 55 L 150 65 L 150 130 L 125 120 Z" fill="#2563eb" opacity="0.7"/>
    <!-- Box front -->
    <path d="M 75 55 L 125 55 L 125 120 L 75 120 Z" fill="#2563eb"/>
  </g>
  
  <!-- Arrow indicating flow -->
  <g stroke="#059669" fill="none" stroke-width="2">
    <path d="M 160 100 L 165 100" stroke-linecap="round"/>
    <polygon points="168,100 163,97 163,103" fill="#059669"/>
  </g>
  
  <!-- Text label -->
  <text x="100" y="150" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">
    SUPPLYCHAIN
  </text>
  <text x="100" y="165" font-size="9" text-anchor="middle" fill="#64748b">
    BLOCKCHAIN
  </text>
</svg>